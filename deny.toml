# cargo-deny policy for Boo.
#
# This is a license/advisory gate for the Cargo dependency graph. It does not
# replace generated third-party notices for binary distribution.

[advisories]
ignore = [
    { id = "RUSTSEC-2024-0436", reason = "paste is currently pulled transitively by wgpu/metal and ravif; no safe direct upgrade is available from Boo" },
]

[licenses]
confidence-threshold = 0.8
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSD-4-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "NCSA",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
