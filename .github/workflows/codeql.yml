name: CodeQL

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: "0 9 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.os }}
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c-cpp
            os: ubuntu-latest
            build-mode: none
          - language: python
            os: ubuntu-latest
            build-mode: none
          - language: rust
            os: ubuntu-latest
            build-mode: none
          - language: swift
            os: macos-latest
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build Swift target
        if: matrix.language == 'swift'
        run: |
          xcodebuild \
            -project ios/Boo.xcodeproj \
            -scheme Boo \
            -destination 'generic/platform=iOS' \
            -derivedDataPath /tmp/boo-ios-derived \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
